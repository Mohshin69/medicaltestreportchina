<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>China Medical Portal | 中国医疗</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f4f4; margin: 0; }
        .header { background: #cc0000; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .menu-btn { font-size: 25px; cursor: pointer; }
        .menu-content { display: none; background: white; border-top: 2px solid #cc0000; padding: 10px; text-align: center; }
        .menu-content a { display: block; padding: 10px; text-decoration: none; color: #333; border-bottom: 1px solid #eee; }
        
        .container { padding: 20px; max-width: 450px; margin: auto; background: white; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #cc0000; color: white; border: none; font-weight: bold; }
        
        /* লোডিং ও রিপোর্ট স্টাইল */
        #loader { display: none; text-align: center; color: #cc0000; font-weight: bold; margin: 20px 0; }
        .report-box { margin-top: 20px; border: 2px solid #333; padding: 10px; position: relative; }
        .stamp { position: absolute; top: 15px; right: 15px; border: 3px solid #000080; color: #000080; padding: 5px; font-weight: bold; transform: rotate(-15deg); opacity: 0.6; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-box">
        <img src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png" width="40" style="background:white; border-radius:50%">
        <strong>中国医疗检查中心</strong>
    </div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div id="menu" class="menu-content">
    <a href="#">首页 (Home)</a>
    <a href="#">医院简介 (About)</a>
    <a href="#">医疗法规 (Rules)</a>
    <a href="#">联系我们 (Contact)</a>
</div>

<div class="container">
    <input type="text" id="passport" placeholder="Passport No (护照号码)">
    <input type="text" id="mobile" placeholder="Mobile No (手机号码)">
    <button onclick="checkReport()">立即查询 (Verify)</button>
    <div id="loader">正在加载数据... (Loading...)</div>
    <div id="result"></div>
</div>

<script>
function toggleMenu() {
    let m = document.getElementById("menu");
    m.style.display = (m.style.display === "block") ? "none" : "block";
}

function checkReport() {
    let loader = document.getElementById("loader");
    let res = document.getElementById("result");
    loader.style.display = "block";
    res.innerHTML = "";
    
    setTimeout(() => {
        loader.style.display = "none";
        let p = document.getElementById("passport").value;
        let m = document.getElementById("mobile").value;
        
        if(p === "A11758023" && m === "01407873051") {
            res.innerHTML = `
                <div class="report-box">
                    <div class="stamp">VERIFIED</div>
                    <img src="https://i.imgur.com/nQeMY9y.jpeg" style="width:100%;">
                    <div style="font-size:12px; margin-top:10px;">
                        <b>Test:</b> ECG, Syphilis, HIV, X-ray<br>
                        <b>Status:</b> PASSED / 合格
                    </div>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=Verified" style="margin-top:10px;">
                </div>
            `;
        } else {
            res.innerHTML = '<p style="color:red; text-align:center;">未找到记录 (No Record)</p>';
        }
    }, 2000);
}
</script>
</body>
</html>
