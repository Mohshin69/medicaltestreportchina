<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Official Medical Report</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #eef2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 20px; width: 95%; max-width: 400px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-top: 8px solid #c8102e; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #c8102e; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* রিপোর্টের স্টাইল - যেখানে সিল ও টেবিল ছবির ওপর থাকবে */
        .report-wrapper { position: relative; margin-top: 20px; border: 2px solid #333; padding: 5px; background: white; }
        .stamp { position: absolute; top: 20px; right: 20px; border: 3px solid #000080; color: #000080; padding: 10px; font-weight: bold; transform: rotate(-15deg); opacity: 0.7; z-index: 10; }
        .overlay-table { position: absolute; bottom: 10px; left: 5px; width: 96%; background: rgba(255, 255, 255, 0.85); font-size: 11px; border: 1px solid #333; }
        .sign { text-align: right; margin-top: 10px; font-size: 12px; font-family: cursive; }
    </style>
</head>
<body>

<div class="container">
    <h2>Medical Report</h2>
    <input type="text" id="passport" placeholder="Passport Number">
    <input type="text" id="mobile" placeholder="Mobile Number">
    <button onclick="checkReport()">Verify</button>
    <div id="result"></div>
</div>

<script>
function checkReport() {
    let p = document.getElementById("passport").value;
    let m = document.getElementById("mobile").value;
    let res = document.getElementById("result");
    
    if(p === "A11758023" && m === "01407873051") {
        res.innerHTML = `
            <div class="report-wrapper">
                <img src="https://i.imgur.com/nQeMY9y.jpeg" style="width:100%;">
                <div class="stamp">VERIFIED<br>OFFICIAL</div>
                <table class="overlay-table">
                    <tr><th>Test</th><th>Result</th></tr>
                    <tr><td>ECG</td><td>Normal</td></tr>
                    <tr><td>Syphilis</td><td>Negative</td></tr>
                    <tr><td>HIV</td><td>Negative</td></tr>
                    <tr><td>Chest X-ray</td><td>Clear</td></tr>
                </table>
            </div>
            <div class="sign">Authorized Signature: <i>Dr. Zhang Wei</i></div>
        `;
    } else {
        res.innerHTML = '<p style="color:red; margin-top:15px;">Record not found!</p>';
    }
}
</script>
</body>
</html>
