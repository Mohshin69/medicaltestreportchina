<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Official Medical Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #eef2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 20px; width: 90%; max-width: 400px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 8px solid #c8102e; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #c8102e; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #loader { display: none; text-align: center; margin-top: 15px; color: #c8102e; }
        .report-box { margin-top: 20px; border: 1px solid #ddd; padding: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        td, th { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>Medical Report</h2>
    <input type="text" id="passport" placeholder="Passport Number">
    <input type="text" id="mobile" placeholder="Mobile Number">
    <button onclick="checkReport()">Verify</button>
    <div id="loader">Processing...</div>
    <div id="result"></div>
</div>

<script>
function checkReport() {
    document.getElementById("loader").style.display = "block";
    document.getElementById("result").innerHTML = "";
    
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        let p = document.getElementById("passport").value;
        let m = document.getElementById("mobile").value;
        
        if(p === "A11758023" && m === "01407873051") {
            document.getElementById("result").innerHTML = `
                <div class="report-box">
                    <img src="https://i.imgur.com/nQeMY9y.jpeg" style="width:100%;">
                    <table>
                        <tr><th>Test</th><th>Result</th></tr>
                        <tr><td>ECG</td><td>Normal</td></tr>
                        <tr><td>Syphilis</td><td>Negative</td></tr>
                        <tr><td>HIV</td><td>Negative</td></tr>
                        <tr><td>Chest X-ray</td><td>Clear</td></tr>
                    </table>
                </div>
            `;
        } else {
            document.getElementById("result").innerHTML = '<p style="color:red;">Record not found!</p>';
        }
    }, 2000);
}
</script>
</body>
</html>
